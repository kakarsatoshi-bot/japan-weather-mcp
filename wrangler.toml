name = "japan-weather-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "JapanWeatherMcpAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["JapanWeatherMcpAgent"]
